<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>8 Martie ❤️</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 60% 40%, #2d0a4e 0%, #180630 55%, #0d001a 100%);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', serif;
      touch-action: manipulation;
    }

    /* ── Stars ── */
    #stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: .15; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.4); }
    }

    /* ── Floating hearts ── */
    #hearts {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1; overflow: hidden;
    }
    .heart {
      position: absolute;
      animation: floatUp linear forwards;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)      translateX(0)               rotate(0deg);   opacity: .85; }
      15%  {                                                                             opacity: .85; }
      85%  {                                                                             opacity: .5;  }
      100% { transform: translateY(-105vh) translateX(var(--dx))       rotate(var(--r)); opacity: 0; }
    }

    /* ── Sparkling particles ── */
    #sparkles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 2;
    }
    .sparkle {
      position: absolute;
      width: 5px; height: 5px;
      background: #ffd700;
      border-radius: 50%;
      animation: sparkleAnim ease-in-out infinite;
    }
    @keyframes sparkleAnim {
      0%,100% { opacity: 0; transform: scale(0); }
      50%      { opacity: 1; transform: scale(1); }
    }

    /* ── Scene wrapper ── */
    .scene {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
    }

    /* ── Title ── */
    .title {
      font-size: clamp(1rem, 5vw, 1.4rem);
      color: #ffd1dc;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      animation: titleGlow 3s ease-in-out infinite alternate;
    }
    @keyframes titleGlow {
      from { text-shadow: 0 0 10px rgba(255,150,200,.5); }
      to   { text-shadow: 0 0 22px rgba(255,150,200,1), 0 0 50px rgba(255,80,150,.6), 0 0 90px rgba(200,40,120,.3); }
    }

    /* ── Flower ── */
    .flower-wrap {
      position: relative;
      width: 210px; height: 210px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .flower {
      position: absolute; inset: 0;
      animation: sway 4s ease-in-out infinite;
    }
    @keyframes sway {
      0%,100% { transform: rotate(-4deg) translateY(0); }
      50%      { transform: rotate( 4deg) translateY(-6px); }
    }

    /* Petals */
    .petal {
      position: absolute;
      width: 64px; height: 90px;
      top: 50%; left: 50%;
      margin-left: -32px; margin-top: -90px;
      transform-origin: 50% 100%;
      border-radius: 50% 50% 28% 28% / 58% 58% 42% 42%;
      transition: transform .45s cubic-bezier(.34,1.56,.64,1),
                  filter    .45s ease;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.35));
    }
    .petal::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(160deg, rgba(255,255,255,.25) 0%, transparent 60%);
    }

    .petal:nth-child(1) { transform: rotate(  0deg); background: linear-gradient(155deg, #ffadd4, #ff3d87); }
    .petal:nth-child(2) { transform: rotate( 45deg); background: linear-gradient(155deg, #ff85be, #e8006d); }
    .petal:nth-child(3) { transform: rotate( 90deg); background: linear-gradient(155deg, #ffadd4, #ff3d87); }
    .petal:nth-child(4) { transform: rotate(135deg); background: linear-gradient(155deg, #ff85be, #e8006d); }
    .petal:nth-child(5) { transform: rotate(180deg); background: linear-gradient(155deg, #ffadd4, #ff3d87); }
    .petal:nth-child(6) { transform: rotate(225deg); background: linear-gradient(155deg, #ff85be, #e8006d); }
    .petal:nth-child(7) { transform: rotate(270deg); background: linear-gradient(155deg, #ffadd4, #ff3d87); }
    .petal:nth-child(8) { transform: rotate(315deg); background: linear-gradient(155deg, #ff85be, #e8006d); }

    /* Bloomed state */
    .flower-wrap.bloom .petal { filter: brightness(1.18) saturate(1.25) drop-shadow(0 4px 8px rgba(0,0,0,.4)); }
    .flower-wrap.bloom .petal:nth-child(1) { transform: rotate(  0deg) scaleY(1.22) scaleX(1.14); }
    .flower-wrap.bloom .petal:nth-child(2) { transform: rotate( 45deg) scaleY(1.22) scaleX(1.14); }
    .flower-wrap.bloom .petal:nth-child(3) { transform: rotate( 90deg) scaleY(1.22) scaleX(1.14); }
    .flower-wrap.bloom .petal:nth-child(4) { transform: rotate(135deg) scaleY(1.22) scaleX(1.14); }
    .flower-wrap.bloom .petal:nth-child(5) { transform: rotate(180deg) scaleY(1.22) scaleX(1.14); }
    .flower-wrap.bloom .petal:nth-child(6) { transform: rotate(225deg) scaleY(1.22) scaleX(1.14); }
    .flower-wrap.bloom .petal:nth-child(7) { transform: rotate(270deg) scaleY(1.22) scaleX(1.14); }
    .flower-wrap.bloom .petal:nth-child(8) { transform: rotate(315deg) scaleY(1.22) scaleX(1.14); }

    /* Center */
    .flower-center {
      position: absolute;
      width: 62px; height: 62px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 35% 32%, #fff7a0, #ffcd00 45%, #ff9500);
      border-radius: 50%;
      z-index: 5;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      animation: centerPulse 2.2s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(255,200,0,.7);
    }
    @keyframes centerPulse {
      0%,100% { box-shadow: 0 0 15px 2px rgba(255,200,0,.6), 0 0 35px 4px rgba(255,140,0,.3); }
      50%      { box-shadow: 0 0 28px 6px rgba(255,220,0,.9), 0 0 55px 10px rgba(255,140,0,.5); }
    }

    /* Hint text */
    .hint {
      font-size: .82rem;
      color: rgba(255,200,220,.65);
      letter-spacing: 2px;
      animation: hintBob 2.8s ease-in-out infinite;
    }
    @keyframes hintBob {
      0%,100% { opacity: .45; transform: translateY(0); }
      50%      { opacity: 1;   transform: translateY(-4px); }
    }

    /* ── Overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(8, 0, 22, .88);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity .4s ease;
      padding: 24px;
    }
    .overlay.active { opacity: 1; pointer-events: all; }

    /* Card */
    .card {
      background: linear-gradient(145deg, #2d0a4e 0%, #3d1060 50%, #4a0a70 100%);
      border: 1px solid rgba(255,107,157,.45);
      border-radius: 26px;
      padding: 38px 28px 32px;
      max-width: 380px; width: 100%;
      text-align: center;
      box-shadow:
        0 0 60px rgba(255,107,157,.18),
        0 22px 55px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.1);
      transform: scale(.72) translateY(28px);
      transition: transform .5s cubic-bezier(.34,1.56,.64,1);
      position: relative; overflow: hidden;
    }
    .overlay.active .card { transform: scale(1) translateY(0); }

    /* Shimmer */
    .card::before {
      content: '';
      position: absolute; inset: -50%;
      background: radial-gradient(ellipse, rgba(255,107,157,.08) 0%, transparent 55%);
      animation: shimmer 5s linear infinite;
    }
    @keyframes shimmer { to { transform: rotate(360deg); } }

    .card-emoji {
      display: block;
      font-size: clamp(2.4rem, 8vw, 3rem);
      margin-bottom: 10px;
      animation: bounce 1.1s ease-in-out infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-9px); }
    }

    .card h2 {
      color: #ffd1dc;
      font-size: clamp(1.25rem, 5.5vw, 1.65rem);
      line-height: 1.35;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,150,200,.8);
      position: relative; z-index: 1;
    }

    .card p {
      color: #eebbd0;
      font-size: clamp(.88rem, 3.8vw, 1rem);
      line-height: 1.9;
      margin-bottom: 10px;
      position: relative; z-index: 1;
    }

    .signature {
      color: #ffd700 !important;
      font-style: italic;
      margin-top: 16px !important;
      text-shadow: 0 0 12px rgba(255,215,0,.55);
    }

    .close-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 13px 38px;
      background: linear-gradient(135deg, #ff6b9d, #ff2d76);
      border: none; border-radius: 50px;
      color: #fff;
      font-family: Georgia, serif;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 6px 22px rgba(255,45,118,.45);
      transition: transform .25s ease, box-shadow .25s ease;
      position: relative; z-index: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .close-btn:hover, .close-btn:active {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 10px 28px rgba(255,45,118,.65);
    }

    /* ── Fireworks canvas ── */
    #fw {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 160;
    }
  </style>
</head>
<body>

  <canvas id="fw"></canvas>
  <div id="stars"></div>
  <div id="hearts"></div>
  <div id="sparkles"></div>

  <div class="scene">
    <div class="title">✨ 8 Martie ✨</div>

    <div class="flower-wrap" id="flower" onclick="openCard()">
      <div class="flower">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="flower-center">🌸</div>
      </div>
    </div>

    <div class="hint">Apasă pe floare ✨</div>
  </div>

  <!-- Message card -->
  <div class="overlay" id="overlay" onclick="overlayClick(event)">
    <div class="card" id="card">
      <span class="card-emoji">💐</span>
      <h2>La mulți ani, de 8 Martie!</h2>
      <p>De 8 Martie îți doresc să fii mereu la fel de minunată, de iubită și de fericită ca astăzi, pentru că ești o femeie importantă din viață mea!</p>
      <p>Sper că ai avut o zi minunată!</p>
      <p class="signature">Vreau să fii fericită! 🌸</p>
      <button class="close-btn" onclick="closeCard()">💕 Mulțumesc</button>
    </div>
  </div>

  <script>
    /* ── Stars ── */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 90; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 2.5 + .5;
      Object.assign(s.style, {
        width: sz + 'px', height: sz + 'px',
        top: Math.random() * 100 + '%',
        left: Math.random() * 100 + '%',
        animationDuration: (Math.random() * 3 + 2) + 's',
        animationDelay: (Math.random() * 4) + 's',
      });
      starsEl.appendChild(s);
    }

    /* ── Sparkles scattered around flower ── */
    const sparklesEl = document.getElementById('sparkles');
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    for (let i = 0; i < 18; i++) {
      const sp = document.createElement('div');
      sp.className = 'sparkle';
      const angle = (i / 18) * Math.PI * 2;
      const r = 115 + Math.random() * 55;
      Object.assign(sp.style, {
        left: (cx + Math.cos(angle) * r - 3) + 'px',
        top:  (cy + Math.sin(angle) * r - 3) + 'px',
        animationDuration: (Math.random() * 2 + 1.2) + 's',
        animationDelay:    (Math.random() * 2) + 's',
        width: (Math.random() * 4 + 2) + 'px',
        height: (Math.random() * 4 + 2) + 'px',
      });
      sparklesEl.appendChild(sp);
    }

    /* ── Floating hearts ── */
    const heartsEl   = document.getElementById('hearts');
    const heartGlyphs = ['❤️','🩷','💕','💖','💗','💝','🌸','✨'];

    function spawnHeart() {
      const el = document.createElement('div');
      el.className = 'heart';
      const dur = 7 + Math.random() * 6;
      el.style.left              = (Math.random() * 94) + '%';
      el.style.bottom            = '-32px';
      el.style.fontSize          = (10 + Math.random() * 16) + 'px';
      el.style.animationDuration = dur + 's';
      el.style.animationDelay    = (Math.random() * 1.5) + 's';
      el.style.setProperty('--dx', ((Math.random() - .5) * 90) + 'px');
      el.style.setProperty('--r',  ((Math.random() - .5) * 400) + 'deg');
      el.textContent = heartGlyphs[Math.floor(Math.random() * heartGlyphs.length)];
      heartsEl.appendChild(el);
      setTimeout(() => el.remove(), (dur + 1.5) * 1000);
    }

    for (let i = 0; i < 8; i++) setTimeout(spawnHeart, i * 250);
    setInterval(spawnHeart, 700);

    /* ── Fireworks ── */
    const fw  = document.getElementById('fw');
    const fctx = fw.getContext('2d');
    let parts = [];

    function resizeFw() { fw.width = innerWidth; fw.height = innerHeight; }
    resizeFw();
    window.addEventListener('resize', resizeFw);

    const COLORS = ['#ff6b9d','#ffd700','#ff3d7f','#c084fc','#60a5fa','#34d399','#fb923c','#fff','#ff85be'];

    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const spd   = Math.random() * 5.5 + 1.2;
        this.vx = Math.cos(angle) * spd;
        this.vy = Math.sin(angle) * spd;
        this.life  = 1;
        this.decay = .013 + Math.random() * .018;
        this.r     = Math.random() * 3 + 1;
        this.tail  = [];
      }
      update() {
        this.tail.push({ x: this.x, y: this.y });
        if (this.tail.length > 6) this.tail.shift();
        this.x  += this.vx;
        this.y  += this.vy;
        this.vy += .09;
        this.vx *= .985;
        this.life -= this.decay;
      }
      draw() {
        fctx.save();
        for (let i = 0; i < this.tail.length; i++) {
          fctx.globalAlpha = (i / this.tail.length) * this.life * .28;
          fctx.fillStyle   = this.color;
          fctx.beginPath();
          fctx.arc(this.tail[i].x, this.tail[i].y, this.r * (i / this.tail.length), 0, Math.PI * 2);
          fctx.fill();
        }
        fctx.globalAlpha = this.life;
        fctx.fillStyle   = this.color;
        fctx.shadowColor = this.color;
        fctx.shadowBlur  = 6;
        fctx.beginPath();
        fctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        fctx.fill();
        fctx.restore();
      }
    }

    function burst(x, y) {
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const n = 55 + Math.floor(Math.random() * 45);
      for (let i = 0; i < n; i++) parts.push(new Particle(x, y, color));
    }

    // Always-running animation loop
    function animateFw() {
      fctx.clearRect(0, 0, fw.width, fw.height);
      parts = parts.filter(p => p.life > 0);
      parts.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateFw);
    }
    animateFw();

    // Continuous fireworks — fire a burst every 1.8s forever
    function scheduleBurst() {
      const x = fw.width  * (.12 + Math.random() * .76);
      const y = fw.height * (.08 + Math.random() * .52);
      burst(x, y);
      if (Math.random() > .5) {
        const x2 = fw.width  * (.12 + Math.random() * .76);
        const y2 = fw.height * (.08 + Math.random() * .52);
        burst(x2, y2);
      }
      setTimeout(scheduleBurst, 1200 + Math.random() * 1200);
    }
    scheduleBurst();

    /* ── Card logic ── */
    function openCard() {
      document.getElementById('flower').classList.add('bloom');
      document.getElementById('overlay').classList.add('active');
      // Extra burst of hearts on each open
      for (let i = 0; i < 20; i++) setTimeout(spawnHeart, i * 80);
    }

    function closeCard() {
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('flower').classList.remove('bloom');
    }

    function overlayClick(e) {
      if (e.target === document.getElementById('overlay')) closeCard();
    }
  </script>
</body>
</html>
